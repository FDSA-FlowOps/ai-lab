name: Test GitHub Models

on:
  workflow_dispatch:

jobs:
  test-model:
    runs-on: ubuntu-latest
    steps:
      - name: Call GPT-4.1
        run: |
          curl https://models.github.ai/orgs/FDSA-FlowOps/inference/chat/completions \
            -H "Authorization: Bearer ${{ secrets.PAT_MODELS_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            -d '{"model":"openai/gpt-4.1","messages":[{"role":"user","content":"Reply only with OK"}]}'
