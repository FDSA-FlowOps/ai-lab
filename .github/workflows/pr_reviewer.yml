name: Codex PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  codex_review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
      should_comment: ${{ steps.guard.outputs.should_comment }}

    steps:
      - name: Guard for missing secret
        id: guard
        shell: bash
        env:
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
        run: |
          if [ -z "$AZURE_OPENAI_API_KEY" ]; then
            echo "should_comment=false" >> "$GITHUB_OUTPUT"
            echo "Skipping Codex review: missing AZURE_OPENAI_API_KEY."
          else
            echo "should_comment=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout PR head commit
        if: steps.guard.outputs.should_comment == 'true'
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Fetch base ref
        if: steps.guard.outputs.should_comment == 'true'
        shell: bash
        run: |
          git fetch --no-tags origin ${{ github.event.pull_request.base.ref }}

      - name: Build review context
        if: steps.guard.outputs.should_comment == 'true'
        shell: bash
        run: |
          MAX_BYTES=120000
          DIFF_FILE=pr-diff.txt

          git diff --unified=3 \
            ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }} \
            > full-diff.txt || true

          FULL_SIZE=$(wc -c < full-diff.txt | tr -d ' ')
          head -c "$MAX_BYTES" full-diff.txt > "$DIFF_FILE"

          TRUNCATED=false
          if [ "$FULL_SIZE" -gt "$MAX_BYTES" ]; then
            TRUNCATED=true
          fi

          {
            echo "# PR metadata"
            echo "PR: #${{ github.event.pull_request.number }}"
            echo "Title: ${{ github.event.pull_request.title }}"
            echo "Base: ${{ github.event.pull_request.base.ref }} (${{ github.event.pull_request.base.sha }})"
            echo "Head: ${{ github.event.pull_request.head.ref }} (${{ github.event.pull_request.head.sha }})"
            echo
            echo "# Commit list"
            git log --oneline ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }} || true
            echo
            echo "# Changed files"
            git diff --name-status ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }} || true
            echo
            echo "# Diff metadata"
            echo "Full diff size bytes: $FULL_SIZE"
            echo "Diff truncated: $TRUNCATED"
            echo "Max bytes included: $MAX_BYTES"
            echo
            if [ "$TRUNCATED" = "true" ]; then
              echo "[WARNING] The diff included below is truncated."
              echo "[WARNING] Review must be treated as partial coverage."
              echo
            fi
            echo "# Unified diff"
            cat "$DIFF_FILE"
          } > pr-review-context.txt

      - name: Run Codex review
        if: steps.guard.outputs.should_comment == 'true'
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.AZURE_OPENAI_API_KEY }}
          responses-api-endpoint: "https://aleja-mmkilrhf-eastus2.cognitiveservices.azure.com/openai/v1/responses"
          model: gpt-5.3-codex
          effort: medium
          sandbox: workspace-write
          prompt: |
            You are an experienced senior code reviewer.

            Review ONLY the changes introduced by this pull request.
            Use the checked-out repository and pr-review-context.txt as the source of truth.

            Pull request info:
            - Repository: ${{ github.repository }}
            - PR number: ${{ github.event.pull_request.number }}
            - Title: ${{ github.event.pull_request.title }}

            PR body:
            ---
            ${{ github.event.pull_request.body }}
            ---

            Review criteria:
            - correctness
            - regressions
            - edge cases
            - security concerns
            - performance issues
            - maintainability
            - test gaps

            Important constraints:
            - Review only the PR diff, not unrelated repository code.
            - Do not invent issues.
            - Ignore minor style nits unless they hide a real engineering problem.
            - Prefer high-signal comments over exhaustive commentary.
            - If the diff is marked as truncated in pr-review-context.txt, explicitly say the review is partial.
            - If the PR looks good, say so clearly.

            Output in Markdown using exactly this structure:

            ## Verdict
            One short paragraph.

            ## Findings
            - If there are important issues, list up to 5 bullets.
            - Each bullet must include:
              - severity: high | medium | low
              - file or area affected
              - concise explanation
              - suggested fix

            ## Missing tests
            - List only if relevant.

            ## Summary
            A short final recommendation:
            - approve
            - approve with minor follow-ups
            - request changes

  post_feedback:
    runs-on: ubuntu-latest
    needs: codex_review
    if: needs.codex_review.outputs.should_comment == 'true' && needs.codex_review.outputs.final_message != ''
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Upsert review comment
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex_review.outputs.final_message }}
        with:
          github-token: ${{ github.token }}
          script: |
            const marker = "<!-- codex-review-comment -->";
            const body = `${marker}

            ## Codex Review

            ${process.env.CODEX_FINAL_MESSAGE}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              per_page: 100
            });

            const existing = comments.find(comment =>
              comment.user?.type === "Bot" &&
              comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body
              });
            }