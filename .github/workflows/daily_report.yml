name: Daily Repo Status Report

on:
  schedule:
    - cron: "42 19 * * 1-5"
  workflow_dispatch:

jobs:
  codex:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Build repo context
        shell: bash
        run: |
          {
            echo "# Recent commits"
            git log --since="24 hours ago" --oneline --decorate -n 50 || true
            echo
            echo "# Changed files in last 24h"
            git diff --name-only HEAD~20..HEAD 2>/dev/null || true
            echo
            echo "# Open workflows"
            find .github/workflows -maxdepth 1 -type f | sort || true
          } > repo-context.txt

      - name: Run Codex
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.AZURE_OPENAI_API_KEY }}
          responses-api-endpoint: "https://aleja-mmkilrhf-eastus2.cognitiveservices.azure.com/openai/v1/responses"
          model: gpt-5.3-codex
          effort: medium
          sandbox: workspace-write
          output-file: daily-report.md
          prompt: |
            You are generating a daily repository status report for ${{ github.repository }}.

            Use the checked-out repository and the file repo-context.txt as your primary context.

            Tasks:
            1. Summarize the most relevant activity from the last 24 hours.
            2. Identify important code, workflow, or documentation changes.
            3. Flag risks, regressions, or areas that need attention.
            4. Propose 3-5 concrete next steps.

            Constraints:
            - Be concise but useful.
            - Do not invent facts not supported by the repository contents.
            - Output valid Markdown.

            Required structure:
            # Daily Repo Status Report
            ## Executive summary
            ## Relevant changes
            ## Risks / alerts
            ## Next steps

  publish_summary:
    runs-on: ubuntu-latest
    needs: codex
    if: needs.codex.outputs.final_message != ''
    steps:
      - name: Publish to job summary
        shell: bash
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex.outputs.final_message }}
        run: |
          {
            echo "${CODEX_FINAL_MESSAGE}"
          } >> "$GITHUB_STEP_SUMMARY"